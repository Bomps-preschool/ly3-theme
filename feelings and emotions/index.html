<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feelings & Emotions Game</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f3e5f5;
    text-align:center;
}

.screen{
    display:none;
    min-height:100vh;
    padding:20px;
    box-sizing:border-box;
}

.active{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.logo{
    width:400px;
    max-width:90%;
}

#questionImage{
    width:650px;
    height:450px;
    object-fit:contain;
    margin:20px auto;
    display:block;
}

#optionsContainer{
    display:flex;
    flex-direction:column;
    align-items:center;
}

.optionBtn{
    width:550px;
    height:100px;
    margin:12px;
    border:none;
    border-radius:25px;
    background:white;
    font-size:40px;
    font-weight:bold;
    cursor:pointer;
    box-shadow:0 4px 10px rgba(0,0,0,0.15);
}

.optionBtn:hover{
    transform:scale(1.02);
}

h1{
    color:#6a1b9a;
}

.score{
    font-size:28px;
    font-weight:bold;
}

@media(max-width:768px){

    .logo{
        width:280px;
    }

    #questionImage{
        width:90%;
        height:300px;
    }

    .optionBtn{
        width:90%;
        height:85px;
        font-size:28px;
    }
}

</style>
</head>

<body>

<!-- SPLASH SCREEN -->

<div id="splashScreen" class="screen active">

    <img
        src="assets/innovinelogo.png"
        class="logo"
        alt="Innovine Logo">

    <h1>Feelings & Emotions</h1>

    <h2>Let's Learn Together!</h2>

</div>

<!-- GAME SCREEN -->

<div id="gameScreen" class="screen">

    <h2 id="questionCounter"></h2>

    <div class="score" id="scoreText"></div>

    <h2>How is the child feeling?</h2>

    <img id="questionImage">

    <div id="optionsContainer"></div>

</div>

<!-- END SCREEN -->

<div id="endScreen" class="screen">

    <h1>🎉 Great Job! 🎉</h1>

    <h2 id="finalScore"></h2>

    <img
        src="assets/innovinelogo.png"
        class="logo"
        alt="Innovine Logo">

    <br><br>

    <button
        class="optionBtn"
        onclick="restartGame()">
        Play Again
    </button>

</div>

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapsSound" src="assets/claps.mp3"></audio>

    ]
