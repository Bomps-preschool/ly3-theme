<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Feelings & Emotions Game</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#f4f7fb;
    text-align:center;
    overflow-x:hidden;
}

.hidden{
    display:none;
}

/* Splash Screen */

#splash{
    position:fixed;
    inset:0;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

#splash img{
    width:320px;
    max-width:85%;
}

/* Game Area */

#gameContainer{
    padding:20px;
}

#questionNumber{
    font-size:32px;
    font-weight:bold;
    margin-top:10px;
    color:#333;
}

#instruction{
    font-size:28px;
    margin:20px 0;
    color:#444;
}

#emotionImage{
    width:450px;
    max-width:95%;
    height:auto;
    border-radius:20px;
    background:white;
    padding:10px;
    box-shadow:0 0 15px rgba(0,0,0,.15);
}

.answer-grid{
    width:100%;
    max-width:700px;
    margin:25px auto;
    display:grid;
    gap:15px;
}

.answer-btn{
    border:none;
    padding:18px;
    font-size:28px;
    border-radius:15px;
    background:#4e73df;
    color:white;
    cursor:pointer;
    transition:.3s;
}

.answer-btn:hover{
    transform:scale(1.03);
}

.correct{
    background:#28a745 !important;
}

.wrong{
    background:#dc3545 !important;
}

#scoreBoard{
    font-size:28px;
    font-weight:bold;
    margin-top:10px;
}

/* Result Screen */

#resultScreen{
    padding:40px 20px;
}

#resultScreen h1{
    font-size:52px;
    margin-bottom:20px;
}

#finalScore{
    font-size:40px;
    margin-bottom:30px;
}

#playAgain{
    border:none;
    background:#4e73df;
    color:white;
    font-size:30px;
    padding:18px 35px;
    border-radius:15px;
    cursor:pointer;
}

/* Confetti */

.confetti{
    position:fixed;
    width:12px;
    height:12px;
    top:-10px;
    animation:fall 4s linear forwards;
}

@keyframes fall{
    from{
        transform:translateY(-50px) rotate(0deg);
    }
    to{
        transform:translateY(110vh) rotate(720deg);
    }
}

@media(max-width:768px){

    #instruction{
        font-size:22px;
    }

    .answer-btn{
        font-size:22px;
    }

    #finalScore{
        font-size:30px;
    }

}
</style>
</head>

<body>

<!-- SPLASH SCREEN -->

<div id="splash">
    <img src="assets/innovinelogo.png" alt="Innovine Logo">
</div>

<!-- GAME SCREEN -->

<div id="gameContainer" class="hidden">

    <div id="questionNumber"></div>

    <div id="instruction">
        Look at the picture and tap the correct emotion.
    </div>

    <img id="emotionImage">

    <div id="answers" class="answer-grid"></div>

    <div id="scoreBoard">
        Score: <span id="score">0</span>
    </div>

</div>

<!-- RESULT SCREEN -->

<div id="resultScreen" class="hidden">

    <h1>🎉 Great Job! 🎉</h1>

    <div id="finalScore"></div>

    <button id="playAgain">
        Play Again
    </button>

</div>
<script>

const questions = [

    {
        image:"assets/happy.png",
        answer:"Happy"
    },

    {
        image:"assets/happy1.png",
        answer:"Happy"
    },

    {
        image:"assets/sad.png",
        answer:"Sad"
    },

    {
        image:"assets/sad1.png",
        answer:"Sad"
    },

    {
        image:"assets/angry.png",
        answer:"Angry"
    },

    {
        image:"assets/angry1.png",
        answer:"Angry"
    },

    {
        image:"assets/scared.png",
        answer:"Scared"
    },

    {
        image:"assets/scared1.png",
        answer:"Scared"
    },

    {
        image:"assets/surprised.png",
        answer:"Surprised"
    },

    {
        image:"assets/surprised1.png",
        answer:"Surprised"
    },

    {
        image:"assets/tired.png",
        answer:"Tired"
    },

    {
        image:"assets/tired1.png",
        answer:"Tired"
    }

];

const emotions = [
    "Happy 😊",
    "Sad 😢",
    "Angry 😠",
    "Scared 😨",
    "Surprised 😲",
    "Tired 😴"
];

let score = 0;
let currentQuestion = 0;

let selectedQuestions =
    [...questions]
    .sort(() => Math.random() - 0.5)
    .slice(0,10);

const correctSound =
    new Audio("assets/correct.mp3");

const wrongSound =
    new Audio("assets/wrong.mp3");

const clapSound =
    new Audio("assets/claps.mp3");

function speak(text){

    if("speechSynthesis" in window){

        speechSynthesis.cancel();

        const speech =
            new SpeechSynthesisUtterance(text);

        speech.rate = 0.9;

        speechSynthesis.speak(speech);

    }

}
function loadQuestion(){

    if(currentQuestion >= selectedQuestions.length){

        finishGame();

        return;
    }

    let question =
        selectedQuestions[currentQuestion];

    document.getElementById("questionNumber")
        .textContent =
        "Question " +
        (currentQuestion + 1) +
        " of 10";

    document.getElementById("emotionImage")
        .src =
        question.image;

    let options = [
        question.answer + " " +
        getEmoji(question.answer)
    ];

    while(options.length < 3){

        let randomEmotion =
            emotions[
                Math.floor(
                    Math.random() *
                    emotions.length
                )
            ];

        if(!options.includes(randomEmotion)){

            options.push(randomEmotion);

        }
    }

    options.sort(() => Math.random() - 0.5);

    let answerArea =
        document.getElementById("answers");

    answerArea.innerHTML = "";

    options.forEach(option => {

        let button =
            document.createElement("button");

        button.className =
            "answer-btn";

        button.textContent =
            option;

        button.onclick =
            () => checkAnswer(
                button,
                option,
                question.answer
            );

        answerArea.appendChild(button);

    });

    speak(
        "Look at the picture and tap the correct emotion."
    );

}

function getEmoji(emotion){

    const emojis = {

        Happy:"😊",
        Sad:"😢",
        Angry:"😠",
        Scared:"😨",
        Surprised:"😲",
        Tired:"😴"

    };

    return emojis[emotion];
}
function checkAnswer(button, selected, correct){

    const isCorrect =
        selected.startsWith(correct);

    if(isCorrect){

        score++;

        document
            .getElementById("score")
            .textContent = score;

        button.classList.add("correct");

        correctSound.play();

    }else{

        button.classList.add("wrong");

        wrongSound.play();
    }

    setTimeout(() => {

        currentQuestion++;

        loadQuestion();

    },1000);
}

function finishGame(){

    document
        .getElementById("gameContainer")
        .classList.add("hidden");

    document
        .getElementById("resultScreen")
        .classList.remove("hidden");

    document
        .getElementById("finalScore")
        .textContent =
        "You scored " +
        score +
        " out of 10";

    clapSound.play();

    createConfetti();
}

function createConfetti(){

    for(let i=0;i<150;i++){

        const confetti =
            document.createElement("div");

        confetti.className =
            "confetti";

        confetti.style.left =
            Math.random()*100 + "vw";

        confetti.style.background =
            `hsl(${Math.random()*360},100%,50%)`;

        document.body.appendChild(confetti);

        setTimeout(()=>{

            confetti.remove();

        },4000);
    }
}

document
.getElementById("playAgain")
.onclick = () => {

    location.reload();

};

setTimeout(()=>{

    document
    .getElementById("splash")
    .style.display="none";

    document
    .getElementById("gameContainer")
    .classList.remove("hidden");

    loadQuestion();

},5000);

</script>

</body>
</html>
