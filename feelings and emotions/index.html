<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Feelings & Emotions Game</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,Helvetica,sans-serif;
    background:#f5f7fb;
    text-align:center;
    overflow-x:hidden;
}

.hidden{
    display:none;
}

#splash{
    position:fixed;
    inset:0;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:999;
}

#splash img{
    width:280px;
    max-width:80%;
}

#gameContainer{
    padding:20px;
}

#questionNumber{
    font-size:28px;
    margin-top:10px;
    color:#333;
}

#questionText{
    font-size:30px;
    margin:20px 0;
    color:#222;
}

#emotionImage{
    width:420px;
    max-width:90%;
    height:auto;
    border-radius:20px;
    background:white;
    padding:10px;
    box-shadow:0 0 15px rgba(0,0,0,.1);
}

.answer-grid{
    margin-top:25px;
    display:grid;
    grid-template-columns:1fr;
    gap:15px;
    max-width:700px;
    margin-left:auto;
    margin-right:auto;
}

.answer-btn{
    padding:18px;
    font-size:28px;
    border:none;
    border-radius:15px;
    cursor:pointer;
    background:#4e73df;
    color:white;
    transition:.3s;
}

.answer-btn:hover{
    transform:scale(1.03);
}

.correct{
    background:#28a745 !important;
}

.wrong{
    background:#dc3545 !important;
}

#scoreBoard{
    font-size:28px;
    margin-top:20px;
    font-weight:bold;
}

#resultScreen{
    padding:40px;
}

#finalScore{
    font-size:40px;
    margin:20px 0;
}

#playAgain{
    padding:18px 35px;
    font-size:28px;
    border:none;
    border-radius:15px;
    background:#4e73df;
    color:white;
    cursor:pointer;
}
</style>
</head>
<body>

<div id="splash">
    <img src="innovine_logo.png" alt="Innovine Logo">
</div>

<div id="gameContainer" class="hidden">

    <div id="questionNumber"></div>

    <div id="questionText">
        Look at the picture and tap the correct emotion.
    </div>

    <img id="emotionImage">

    <div id="answers" class="answer-grid"></div>

    <div id="scoreBoard">
        Score: <span id="score">0</span>
    </div>

</div>

<div id="resultScreen" class="hidden">

    <h1>🎉 Great Job! 🎉</h1>

    <div id="finalScore"></div>

    <button id="playAgain">
        Play Again
    </button>

</div>
